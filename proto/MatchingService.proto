syntax = "proto3";

package MatchingServicePackage;

option go_package = "CommandCenter/proto";

service MatchingServerService {
  rpc OnHeartbeat(stream Heartbeat) returns (stream HeartbeatResponseEnvelope);
  rpc OnPoolDefinitionRequest(PoolDefinitionRequest) returns (PoolDefinitionResponseEnvelope);
  rpc OnOrderNew(stream OrderNew) returns (stream OrderNewResponseEnvelope);
  rpc OnOrderCancel(stream OrderCancel) returns (stream OrderCancelResponseEnvelope);
}

enum MessageType {
  HEARTBEAT = 0;
  GENERAL_REJECT = 1;
  POOL_DEFINITION_REQUEST = 2;
  POOL_DEFINITION_RESPONSE = 3;
  ORDER_NEW = 4;
  ORDER_NEW_ACKNOWLEDGEMENT = 5;
  ORDER_CANCEL = 6;
  ORDER_CANCEL_ACKNOWLEDGEMENT = 7;
  ORDER_FILL = 8;
}

enum OrderType {
  LIMIT = 0;
  MARKET = 1;
}

message MessageBase {
  uint32 versionMajor = 1;
  uint32 versionMinor = 2;
  MessageType messageType = 3;
}

message SequencedMessageBase {
  uint64 sequenceNumber = 1;
}

message ResponseBase {
  uint64 requestSequenceNumber = 1;
}

// Some response types can fail if the request has invalid information, in which case they compose themselves with this message
message FallibleBase {
  bool success = 1;
  string errorDescription = 2;
}

message Heartbeat {
  MessageBase messageBase = 1;
}

message GeneralReject {
  message Body {
    string errorDescription = 1;
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  ResponseBase responseBase = 3;
  Body body = 4;
}

message PoolDefinitionRequest {
  message Body {
    uint64 poolId = 1;
    uint64 totalUnits = 2;
    repeated uint64 legSecurityIds = 3;
  }
  
  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  Body body = 3;
}

message PoolDefinitionResponse {
  message Body {
    message Lineup {
      message Leg {
        uint64 securityId = 1;
        bool isOver = 2;
      }

      uint64 lineupIndex = 1;
      repeated Leg legs = 2;
    }

    uint64 poolId = 1;
    repeated Lineup lineups = 2; // contains a list of all possible lineups that fall into this pool
    bool isNew = 3; // indicates whether this is a newly defined pool (true) or already existed (false)
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  ResponseBase responseBase = 3;
  FallibleBase fallibleBase = 4;
  Body body = 5;
}

message OrderNew {
  message Body {
    uint64 poolId = 1;
    uint64 lineupIndex = 2;
    OrderType orderType = 3;
    uint64 portion = 4;
    uint64 quantity = 5;
    optional uint64 selfMatchId = 6; // Protects a user from filling against orders entirely against themselves. If unpopulated, user gets no protections
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  Body body = 3;
}

message OrderNewAcknowledgement {
  message Body {
    uint64 orderId = 1;
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  ResponseBase responseBase = 3;
  FallibleBase fallibleBase = 4;
  Body body = 5;
}

message OrderCancel {
  message Body {
    uint64 orderId = 1;
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  Body body = 3;
}

message OrderCancelAcknowledgement {
  message Body {
    uint64 orderId = 1;
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  ResponseBase responseBase = 3;
  FallibleBase fallibleBase = 4;
  Body body = 5;
}

// Similar to OrderCancelAcknowledgement but sent if the order is cancelled when the user has not requested a cancel (e.g., during Matcher shutdown)
message OrderElimination {
  message Body {
    string eliminationDescription = 1;
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  uint64 orderId = 3;
  Body body = 4;
}

message FillEvent {
  message Body
  {
    message Fill {
      uint64 fillId = 1;
      uint64 orderId = 2;
      bool isAggressor = 3;
      uint64 matchedPortion = 4;
    }

    uint64 transactionId = 1;
    uint64 fillEventId = 2;
    uint64 matchedQuantity = 3;
    repeated Fill fills = 4;
  }

  MessageBase messageBase = 1;
  SequencedMessageBase sequencedMessageBase = 2;
  Body body = 3;
}

// Encapsulate all possible messages that can be sent as a result of Heartbeat
message HeartbeatResponseEnvelope {
  oneof contents {
    GeneralReject generalReject = 1;
    Heartbeat heartbeat = 2;
  }
}

// Encapsulate all possible messages that can be sent as a result of PoolDefinitionRequest
message PoolDefinitionResponseEnvelope {
  oneof contents {
    GeneralReject generalReject = 1;
    PoolDefinitionResponse response = 2;
  }
}

// Encapsulate all possible messages that can be sent as a result of OrderNew
message OrderNewResponseEnvelope {
  oneof contents {
    GeneralReject generalReject = 1;
    OrderNewAcknowledgement acknowledgement = 2;
    OrderElimination elimination = 3;
    FillEvent fill = 4;
  }
}

// Encapsulate all possible messages that can be sent as a result of OrderCancel
message OrderCancelResponseEnvelope {
  oneof contents {
    GeneralReject generalReject = 1;
    OrderCancelAcknowledgement acknowledgement = 2;
  }
}
