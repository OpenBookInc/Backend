syntax = "proto3";

package OpenBook.MatchingServicePackage;

import "Common.proto";

option go_package = "OpenBook/MatchingService/proto";

// MatchingServerService handles bidirectional streaming of orders and matches
// between the gateway and the matching engine.
service MatchingServerService {
  // CreateTradeStream establishes a bidirectional stream for order submission,
  // cancellation, and match notifications between the gateway and matching
  // engine. Sequence numbers are strictly validated - mismatches trigger fatal
  // errors.
  rpc CreateTradeStream(stream GatewayMessage) returns (stream EngineMessage);
}

// Messages sent from gateway → engine
message GatewayMessage {
  OpenBook.CommonPackage.SequencedMessageBase sequenced_message_base = 1;

  oneof msg {
    NewOrder new_order = 2;
    CancelOrder cancel_order = 3;
    DefinePool define_pool = 4;
  }
}

// Messages sent from engine → gateway
message EngineMessage {
  OpenBook.CommonPackage.SequencedMessageBase sequenced_message_base = 1;

  oneof event {
    NewOrderAcknowledgement new_order_acknowledgement = 2;
    CancelOrderAcknowledgement cancel_order_acknowledgement = 3;
    OrderElimination elimination = 4;
    Match match = 5;
    DefinePoolAcknowledgement define_pool_acknowledgement = 6;
  }
}

// Sent from gateway to engine to define a pool before orders can be placed.
// The engine rejects duplicate definitions (even if fields are identical)
// and rejects orders targeting an undefined pool.
message DefinePool {
  message Body {
    OpenBook.CommonPackage.UUID slate_id = 1;
    uint64 total_units = 2;
    uint64 num_lineups = 3;
  }

  Body body = 1;
}

message DefinePoolAcknowledgement {
  message Body {
    OpenBook.CommonPackage.UUID slate_id = 1;
  }

  OpenBook.CommonPackage.ResponseBase response_base = 1;
  OpenBook.CommonPackage.FallibleBase fallible_base = 2;
  Body body = 3;
}

message NewOrder {
  message Body {
    OpenBook.CommonPackage.UUID client_order_id =
        1; // Unique identifier (assigned by the matching engine gateway) to tie
           // OrderNewAcknowledgement back to this OrderNew
    OpenBook.CommonPackage.UUID slate_id = 2; // Pool this order belongs to
    uint64 lineup_index = 3; // Which lineup within the pool
    OpenBook.CommonPackage.OrderType order_type = 4;
    uint64 portion = 5;
    uint64 quantity = 6;
    optional OpenBook.CommonPackage.UUID self_match_id =
        7; // Protects a user from filling against orders entirely against
           // themselves. If unpopulated, user gets no protections.
  }

  Body body = 1;
}

message NewOrderAcknowledgement {
  message Body {
    OpenBook.CommonPackage.UUID client_order_id = 1;
    uint64 order_id = 2;
  }

  OpenBook.CommonPackage.ResponseBase response_base = 1;
  OpenBook.CommonPackage.FallibleBase fallible_base = 2;
  Body body = 3;
}

message CancelOrder {
  message Body { uint64 order_id = 1; }

  Body body = 1;
}

message CancelOrderAcknowledgement {
  message Body { uint64 order_id = 1; }

  OpenBook.CommonPackage.ResponseBase response_base = 1;
  OpenBook.CommonPackage.FallibleBase fallible_base = 2;
  Body body = 3;
}

// Similar to CancelOrderAcknowledgement but sent if the order is cancelled when
// the user has not requested a cancel (e.g., during Matcher shutdown)
message OrderElimination {
  message Body {
    uint64 order_id = 1;
    string elimination_description = 2;
  }

  Body body = 1;
}

message Match {
  message Body {
    message FillEvent {
      uint64 fill_event_id = 1;
      uint64 order_id = 2;
      bool is_aggressor = 3;
      uint64 matched_portion = 4;
      bool is_complete =
          5; // only marked true for the final fill notification of an order
    }

    uint64 transaction_id =
        1; // If there are multiple matches resulting from one new order, they
           // all share the same transactionId
    uint64 match_id = 2; // If there are multiple matches resulting from one new
                         // order, they all have unique matchIds
    uint64 matched_quantity = 3;
    repeated FillEvent fill_events = 4;
  }

  Body body = 1;
}
