syntax = "proto3";

package OpenBook.MatchingServicePackage;

import "Common.proto";

option go_package = "OpenBook/proto";

service MatchingServerService {
  rpc CreateTradeStream(stream GatewayMessage) returns (stream EngineMessage);
}

// Messages sent from gateway → engine
message GatewayMessage {
  SequencedMessageBase sequencedMessageBase = 1;

  oneof msg {
    NewOrder newOrder = 2;
    CancelOrder cancelOrder = 3;
  }
}

// Messages sent from engine → gateway
message EngineMessage {
  SequencedMessageBase sequencedMessageBase = 1;

  oneof event {
    NewOrderAcknowledgement newOrderAcknowledgement = 2;
    CancelOrderAcknowledgement cancelOrderAcknowledgement = 3;
    OrderElimination elimination = 4;
    Match match = 5;
  }
}

message NewOrder {
  message Body {
    message Leg {
      uint64 legSecurityId = 1;
      bool isOver = 2;
    }

    uint64 clientOrderId = 1;
    repeated Leg legs = 2;
    OrderType orderType = 3;
    uint64 portion = 4;
    uint64 quantity = 5;
    optional uint64 selfMatchId =
        6; // Protects a user from filling against orders entirely against
           // themselves. If unpopulated, user gets no protections
  }

  Body body = 1;
}

message NewOrderAcknowledgement {
  message Body {
    uint64 clientOrderId = 1;
    uint64 orderId = 2;
  }

  ResponseBase responseBase = 1;
  FallibleBase fallibleBase = 2;
  Body body = 3;
}

message CancelOrder {
  message Body { uint64 orderId = 1; }

  Body body = 1;
}

message CancelOrderAcknowledgement {
  message Body { uint64 orderId = 1; }

  ResponseBase responseBase = 1;
  FallibleBase fallibleBase = 2;
  Body body = 3;
}

// Similar to CancelOrderAcknowledgement but sent if the order is cancelled when
// the user has not requested a cancel (e.g., during Matcher shutdown)
message OrderElimination {
  message Body {
    uint64 orderId = 1;
    string eliminationDescription = 2;
  }

  Body body = 1;
}

message Match {
  message Body {
    message FillEvent {
      uint64 fillEventId = 1;
      uint64 orderId = 2;
      bool isAggressor = 3;
      uint64 matchedPortion = 4;
      bool isComplete =
          5; // only marked true for the final fill notification of an order
    }

    uint64 transactionId = 1;
    uint64 matchId = 2;
    uint64 matchedQuantity = 3;
    repeated FillEvent fillEvents = 4;
  }

  Body body = 1;
}
