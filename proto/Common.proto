syntax = "proto3";

package OpenBook.CommonPackage;

option go_package = "OpenBook/Common/proto";

enum OrderType {
  LIMIT = 0;
  MARKET = 1;
}

message SequencedMessageBase { uint64 sequence_number = 1; }

message ResponseBase { uint64 request_sequence_number = 1; }

// Some response types can fail if the request has invalid information, in which
// case they compose themselves with this message
message FallibleBase {
  bool success = 1;
  string error_description = 2;
}
