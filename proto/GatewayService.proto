syntax = "proto3";

package OpenBook.GatewayServicePackage;

import "Common.proto";

option go_package = "OpenBook/GatewayService/proto";

// GatewayServerService handles bidirectional streaming between clients and the
// matching engine. Clients send NewOrder and CancelOrder messages; the gateway
// responds with ordered GatewayEvents (acknowledgements, matches, and
// snapshots) maintaining strict sequence validation.
service GatewayServerService {
  // Bidirectional streaming RPC:
  // Client sends NewOrder / CancelOrder messages.
  // Gateway sends ordered GatewayEvents (acks, matches, snapshots).
  rpc CreateTradeStream(stream BackendMessage) returns (stream GatewayMessage);
}

// Messages sent from client → server
message BackendMessage {
  oneof msg {
    NewOrder new_order = 1;
    CancelOrder cancel_order = 4;
    OrderPoolSyncRequest order_pool_sync_request = 5;
  }
}

// Messages sent from server → client
message GatewayMessage {
  OpenBook.CommonPackage.SequencedMessageBase sequenced_message_base = 1;

  oneof event {
    NewOrderAcknowledgement new_order_acknowledgement = 2;
    CancelOrderAcknowledgement cancel_order_acknowledgement = 3;
    Match match = 4;
    OrderPoolSnapshot order_pool_snapshot = 5;
    OrderElimination elimination = 6;
  }
}

message NewOrder {
  message Body {
    message Leg {
      OpenBook.CommonPackage.UUID leg_security_id = 1;
      bool is_over = 2;
    }

    OpenBook.CommonPackage.UUID user_id = 1;
    uint64 client_order_id = 2;
    repeated Leg legs = 3;
    OpenBook.CommonPackage.OrderType order_type = 4;
    uint64 portion = 5;
    uint64 quantity = 6;
  }

  Body body = 1;
}

message CancelOrder {
  message Body { OpenBook.CommonPackage.UUID order_id = 1; }

  Body body = 1;
}

message CancelOrderAcknowledgement {
  message Body { OpenBook.CommonPackage.UUID order_id = 1; }

  OpenBook.CommonPackage.ResponseBase response_base = 1;
  OpenBook.CommonPackage.FallibleBase fallible_base = 2;
  Body body = 3;
}

message NewOrderAcknowledgement {
  message Body {
    uint64 client_order_id = 1;
    OpenBook.CommonPackage.UUID order_id = 2;
  }

  OpenBook.CommonPackage.ResponseBase response_base = 1;
  OpenBook.CommonPackage.FallibleBase fallible_base = 2;
  Body body = 3;
}

message Match {
  message Body {
    message FillEvent {
      OpenBook.CommonPackage.UUID fill_event_id = 1;
      OpenBook.CommonPackage.UUID order_id = 2;
      bool is_aggressor = 3;
      uint64 matched_portion = 4;
      bool is_complete =
          5; // only marked true for the final fill notification of an order
    }

    uint64 transaction_id =
        1; // If there are multiple matches resulting from one new order, they
           // all share the same transactionId
    OpenBook.CommonPackage.UUID match_id =
        2; // If there are multiple matches resulting from one new
           // order, they all have unique matchIds
    uint64 matched_quantity = 3;
    repeated FillEvent fill_events = 4;
  }

  Body body = 1;
}

message OrderElimination {
  message Body { OpenBook.CommonPackage.UUID order_id = 1; }

  Body body = 1;
}

message OrderPoolSyncRequest {
  message Body {}

  Body body = 1;
}

message OrderPoolSnapshot {
  message LineupBook {
    message Level {
      message Order { uint64 quantity_remaining = 1; }

      uint64 portion = 1;
      repeated Order orders = 2;
    }

    repeated bool is_over = 1;
    repeated Level levels = 2;
  }

  OpenBook.CommonPackage.UUID slate_id = 1;
  repeated OpenBook.CommonPackage.UUID leg_security_ids = 2;
  repeated LineupBook lineup_books = 3;
}
